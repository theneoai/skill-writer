name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR info
        id: pr
        run: |
          echo "title=$(jq -r '.pull_request.title' $GITHUB_EVENT_PATH)" >> $GITHUB_OUTPUT
          echo "body=$(jq -r '.pull_request.body // ""' $GITHUB_EVENT_PATH)" >> $GITHUB_OUTPUT
          echo "author=$(jq -r '.pull_request.user.login' $GITHUB_EVENT_PATH)" >> $GITHUB_OUTPUT
          echo "number=$(jq -r '.pull_request.number' $GITHUB_EVENT_PATH)" >> $GITHUB_OUTPUT

      - name: Check Python files changed
        id: python-changes
        run: |
          CHANGED_PY=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD | grep -E '\.py$' | wc -l)
          echo "count=$CHANGED_PY" >> $GITHUB_OUTPUT

      - name: Run code review
        id: review
        run: |
          PR_TITLE="${{ steps.pr.outputs.title }}"
          PR_AUTHOR="${{ steps.pr.outputs.author }}"
          PY_CHANGES=${{ steps.python-changes.outputs.count }}
          
          REVIEW_COMMENT="## 🤖 AI Code Review

### Review Summary
**Author:** @$PR_AUTHOR  
**PR Title:** $PR_TITLE  

This pull request modifies **$PY_CHANGES** Python files.

**Review Focus Areas:**
1. **Code Quality** - PEP 8 compliance, type hints
2. **Test Coverage** - Unit tests for changed modules
3. **API Design** - Backward compatibility
4. **Documentation** - Docstrings and comments

**Automated Checks:**
- Lint: ruff check
- Type Check: mypy
- Tests: pytest (634 tests)

---
*Automated review by skill CI system*"

          echo "comment=$REVIEW_COMMENT" >> $GITHUB_OUTPUT

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${{ steps.review.outputs.comment }}`
            })
