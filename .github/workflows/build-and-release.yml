name: Skill Writer - Validate and Release

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Validate platform skill files ──────────────────────────────────────────
  validate:
    name: Validate skill files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check platform directories exist
        run: |
          missing=()
          for platform in claude openclaw opencode cursor gemini openai kimi hermes; do
            if [[ ! -d "$platform" ]]; then
              missing+=("$platform/")
            fi
          done
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "⚠ Missing platform directories: ${missing[*]}"
            echo "  (Add them with install.sh or create the directory manually)"
          else
            echo "✓ All 8 platform directories present"
          fi

      - name: Validate frontmatter (agentskills.io v1.0 compat)
        run: python3 scripts/check-spec-compat.py

      - name: Validate platform mirrors match canonical
        run: python3 scripts/build-platforms.py --check

      - name: Validate skill-writer business rules (tier, triggers, sections)
        run: |
          python3 - <<'EOF'
          import os, sys, re

          platforms = ['claude', 'openclaw', 'opencode', 'cursor', 'gemini', 'openai', 'kimi', 'hermes']
          required_fields = ['name', 'version', 'description', 'skill_tier', 'triggers', 'use_to_evolve']
          ute_fields = ['enabled', 'injected_by', 'injected_at', 'check_cadence',
                        'micro_patch_enabled', 'feedback_detection', 'certified_lean_score',
                        'last_ute_check', 'pending_patches', 'total_micro_patches_applied',
                        'cumulative_invocations', 'generation_method', 'validation_status']
          errors = []
          warnings = []

          for platform in platforms:
            ext = 'mdc' if platform == 'cursor' else 'md'
            skill_file = f'{platform}/skill-writer.{ext}'
            if not os.path.exists(skill_file):
              warnings.append(f'{skill_file}: missing (platform not yet added)')
              continue

            content = open(skill_file).read()
            matches = list(re.finditer(r'^---\n', content, re.MULTILINE))
            if len(matches) < 2:
              errors.append(f'{skill_file}: no YAML frontmatter found')
              continue

            fm_start = -1
            fm_end = -1
            for i, m in enumerate(matches[:-1]):
              segment = content[m.end():matches[i+1].start()]
              if 'name: skill-writer' in segment:
                fm_start = m.end()
                fm_end = matches[i+1].start()
                break

            if fm_start == -1:
              errors.append(f'{skill_file}: no frontmatter with "name: skill-writer" found')
              continue

            frontmatter = content[fm_start:fm_end]

            for field in required_fields:
              if not re.search(rf'^{re.escape(field)}[:\s]', frontmatter, re.MULTILINE):
                errors.append(f'{skill_file}: missing required field "{field}"')

            for uf in ute_fields:
              if uf not in frontmatter:
                errors.append(f'{skill_file}: use_to_evolve missing subfield "{uf}"')

            if 'skill_tier: planning' not in frontmatter \
               and 'skill_tier: functional' not in frontmatter \
               and 'skill_tier: atomic' not in frontmatter:
              errors.append(f'{skill_file}: skill_tier must be planning|functional|atomic')

            desc_match = re.search(r'^description:\s+"(.+)"', frontmatter, re.MULTILINE)
            if desc_match and len(desc_match.group(1)) > 1024:
              errors.append(f'{skill_file}: description exceeds 1024 chars ({len(desc_match.group(1))})')

            if 'triggers:' not in frontmatter:
              errors.append(f'{skill_file}: missing triggers field')
            else:
              en_triggers = re.findall(r'en:\s*\n((?:\s+-\s+.+\n)+)', frontmatter)
              if en_triggers:
                count = len(re.findall(r'^\s+-\s+', en_triggers[0], re.MULTILINE))
                if count < 3:
                  errors.append(f'{skill_file}: triggers.en needs ≥3 phrases (found {count})')
              zh_triggers = re.findall(r'zh:\s*\n((?:\s+-\s+.+\n)+)', frontmatter)
              if zh_triggers:
                count = len(re.findall(r'^\s+-\s+', zh_triggers[0], re.MULTILINE))
                if count < 2:
                  errors.append(f'{skill_file}: triggers.zh needs ≥2 phrases (found {count})')

            if '## Skill Summary' not in content:
              errors.append(f'{skill_file}: missing "## Skill Summary" section')
            if 'Negative Boundaries' not in content:
              errors.append(f'{skill_file}: missing "Negative Boundaries" section')

            print(f'✓ {skill_file}: business rules valid')

          for w in warnings:
            print(f'⚠ {w}')
          if errors:
            for e in errors:
              print(f'✗ ERROR: {e}', file=sys.stderr)
            sys.exit(1)
          print('\n✓ All skill files pass business-rule validation')
          EOF

      - name: Check install scripts are executable
        run: |
          failed=0
          for script in claude/install.sh openclaw/install.sh opencode/install.sh \
                        cursor/install.sh gemini/install.sh openai/install.sh \
                        kimi/install.sh hermes/install.sh install.sh; do
            if [[ -f "$script" ]]; then
              if [[ ! -x "$script" ]]; then
                echo "✗ $script is not executable"
                failed=$((failed+1))
              else
                echo "✓ $script"
              fi
            else
              echo "⚠ $script missing (skipped)"
            fi
          done
          [[ $failed -eq 0 ]] || exit 1

      - name: Validate install.sh --dry-run (all platforms)
        run: |
          failed=0
          for platform in claude openclaw opencode cursor gemini openai kimi hermes; do
            script="${platform}/install.sh"
            if [[ -f "$script" ]]; then
              if bash "$script" --dry-run > /dev/null 2>&1; then
                echo "✓ $script --dry-run passed"
              else
                echo "✗ $script --dry-run failed"
                failed=$((failed+1))
              fi
            else
              echo "⚠ $script missing (skipped)"
            fi
          done
          [[ $failed -eq 0 ]] || exit 1

      - name: Validate idempotency (claude reinstall)
        run: |
          export HOME=/tmp/test_claude_idempotency
          mkdir -p "$HOME/.claude"
          bash claude/install.sh --dry-run > /dev/null 2>&1
          bash claude/install.sh --dry-run > /dev/null 2>&1
          echo "✓ claude/install.sh --dry-run idempotent"

      - name: Check skill-framework.md exists and has frontmatter
        run: |
          [[ -f skill-framework.md ]] || { echo "✗ skill-framework.md missing"; exit 1; }
          head -5 skill-framework.md | grep -q '^---' || { echo "✗ skill-framework.md: no YAML frontmatter"; exit 1; }
          echo "✓ skill-framework.md present with frontmatter"

      - name: Check version consistency across all platform files
        run: |
          expected="$(cat VERSION)"
          echo "Expected version from VERSION file: $expected"
          python3 scripts/check-version.py "$expected"

  # ── Create GitHub Release ───────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: validate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare release assets
        run: |
          mkdir -p dist

          # Platform Markdown skill files
          for platform in claude openclaw opencode gemini openai kimi hermes; do
            src="${platform}/skill-writer.md"
            if [[ -f "$src" ]]; then
              cp "$src" "dist/skill-writer-${platform}.md"
              echo "✓ dist/skill-writer-${platform}.md"
            else
              echo "⚠ $src not found — skipped"
            fi
          done

          # Cursor uses .mdc format
          if [[ -f "cursor/skill-writer.mdc" ]]; then
            cp cursor/skill-writer.mdc dist/skill-writer-cursor.mdc
            echo "✓ dist/skill-writer-cursor.mdc"
          fi

          # Universal asset: skill-framework.md → skill-writer.md
          cp skill-framework.md dist/skill-writer.md
          echo "✓ dist/skill-writer.md (universal / skill-framework)"

          # MCP integration guide
          if [[ -f "experimental/mcp-integration.md" ]]; then
            cp experimental/mcp-integration.md dist/mcp-integration.md
            echo "✓ dist/mcp-integration.md"
          else
            echo "⚠ experimental/mcp-integration.md not found — skipped"
          fi

          echo ""
          echo "Release assets:"
          ls -lh dist/

      - name: Generate release notes
        run: |
          VERSION="${{ github.ref_name }}"
          BASE="https://github.com/${{ github.repository }}/releases/download/${VERSION}"

          # Extract changelog entry for this version
          CHANGELOG_SECTION=""
          if [[ -f CHANGELOG.md ]]; then
            CHANGELOG_SECTION=$(awk "/^## \[${VERSION#v}\]|^## ${VERSION}/,/^## \[/{if(/^## \[/ && !/^## \[${VERSION#v}\]|^## ${VERSION}/){exit}print}" CHANGELOG.md | head -50)
          fi

          cat > release-body.md << EOF
          ## Install skill-writer ${VERSION}

          Paste a command into your AI agent to install skill-writer instantly.

          ### Agent Install — per platform

          | Platform | Command (paste into your AI agent) |
          |----------|------------------------------------|
          | **Claude** | \`read ${BASE}/skill-writer-claude.md and install to claude\` |
          | **OpenClaw** | \`read ${BASE}/skill-writer-openclaw.md and install to openclaw\` |
          | **OpenCode** | \`read ${BASE}/skill-writer-opencode.md and install to opencode\` |
          | **Cursor** | \`read ${BASE}/skill-writer-cursor.mdc and install to cursor\` |
          | **Gemini** | \`read ${BASE}/skill-writer-gemini.md and install to gemini\` |
          | **OpenAI** | \`read ${BASE}/skill-writer-openai.md and install to openai\` |
          | **Kimi** | \`read ${BASE}/skill-writer-kimi.md and install to kimi\` |
          | **Hermes** | \`read ${BASE}/skill-writer-hermes.md and install to hermes\` |
          | **All (auto-detect)** | \`read ${BASE}/skill-writer.md and install\` |

          ### Shell script install

          \`\`\`bash
          git clone https://github.com/${{ github.repository }}.git
          cd skill-writer
          ./install.sh               # auto-detect platforms
          ./install.sh --all         # all 8 platforms
          ./install.sh --platform claude
          \`\`\`

          ### Release assets

          | File | Platform | Format |
          |------|----------|--------|
          | \`skill-writer.md\` | Universal (skill-framework) | Markdown |
          | \`skill-writer-claude.md\` | Claude | Markdown |
          | \`skill-writer-openclaw.md\` | OpenClaw | Markdown |
          | \`skill-writer-opencode.md\` | OpenCode | Markdown |
          | \`skill-writer-cursor.mdc\` | Cursor | MDC rule |
          | \`skill-writer-gemini.md\` | Gemini | Markdown |
          | \`skill-writer-openai.md\` | OpenAI | Markdown |
          | \`skill-writer-kimi.md\` | Kimi | Markdown |
          | \`skill-writer-hermes.md\` | Hermes | Markdown |

          ${CHANGELOG_SECTION:+### What's New
          ${CHANGELOG_SECTION}}
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: release-body.md
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
