name: Skill Writer - Build and Release

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: builder/package.json

    - name: Install dependencies
      run: |
        cd builder
        npm ci

    - name: Validate core engine
      run: |
        cd builder
        node bin/skill-writer-builder.js validate

    - name: Check code style
      run: |
        cd builder
        npm run lint

    - name: Run tests
      run: |
        cd builder
        npm test

  build:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        # Need full history so we can push back
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: builder/package.json

    - name: Install dependencies
      run: cd builder && npm ci

    - name: Build all platforms (release build)
      run: |
        cd builder
        node bin/skill-writer-builder.js build \
          --all \
          --release \
          --output ../platforms

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: skill-writer-all-platforms
        path: platforms/

    - name: Commit updated platform files (main branch only)
      # Auto-commit freshly built platform files so cloners never need to run the builder.
      # [skip ci] prevents an infinite build loop.
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if git diff --quiet platforms/; then
          echo "platforms/ is already up to date — nothing to commit."
        else
          git add platforms/
          git commit -m "chore: refresh pre-built platform files [skip ci]"
          git push origin main
          echo "  ✓ Updated platforms/ committed to main."
        fi

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        name: skill-writer-all-platforms
        path: release-assets

    - name: Prepare release assets with clean names
      run: |
        mkdir -p dist
        # Release build already uses clean names (no -dev suffix).
        for platform in opencode openclaw claude cursor gemini; do
          src="release-assets/skill-writer-${platform}.md"
          if [[ -f "${src}" ]]; then
            cp "${src}" "dist/skill-writer-${platform}.md"
            echo "  ✓ dist/skill-writer-${platform}.md"
          fi
        done
        # OpenAI produces JSON
        if [[ -f "release-assets/skill-writer-openai.json" ]]; then
          cp "release-assets/skill-writer-openai.json" "dist/skill-writer-openai.json"
          echo "  ✓ dist/skill-writer-openai.json"
        fi
        # MCP produces JSON manifest
        if [[ -f "release-assets/skill-writer-mcp.json" ]]; then
          cp "release-assets/skill-writer-mcp.json" "dist/skill-writer-mcp.json"
          echo "  ✓ dist/skill-writer-mcp.json"
        fi
        # Universal asset: skill-framework.md → skill-writer.md
        cp skill-framework.md dist/skill-writer.md
        echo "  ✓ dist/skill-writer.md (universal)"

    - name: Generate release body with agent install instructions
      run: |
        VERSION="${{ github.ref_name }}"
        BASE="https://github.com/${{ github.repository }}/releases/download/${VERSION}"
        cat > release-body.md << EOF
        ## Install skill-writer ${VERSION}

        Paste one of the commands below into your AI agent to install skill-writer.

        ### What's new in v3.3.0 — Three-Tier Hook Routing + SkillRouter Weighted Ranking

        - **Three-Tier Routing Model** — AGENTS.md (session-constant) → UserPromptSubmit Hook (per-message) → trigger phrases; solves "LLM forgets skills exist" without relying on trigger-phrase matching alone
        - **INSTALL steps 4e + 4f** — Auto-generate \`CLAUDE.md\`/\`AGENTS.md\` routing rules and \`UserPromptSubmit\` hook config in one install pass; idempotent (safe to re-run)
        - **Progressive Disclosure Layer -1** — ≤50-token Hook Injection layer; five-layer architecture (Layer -1 through Layer 3)
        - **SkillRouter Weighted Ranking** — Multi-factor rank formula (trigger×0.4 + lean\_score×0.3 + usage\_freq×0.2 + source\_quality×0.1); quality threshold gate (0.35) prevents low-confidence routing
        - **Trigger Discovery Pipeline** — AGGREGATE Rule 4 mines \`candidate_triggers\` from session artifacts; promotes phrases at ≥5 count / ≥70% confidence to canonical triggers
        - **\`trigger_signals\`** — New session artifact field: \`trigger_used\`, \`matched_trigger\`, \`match_type\`, \`trigger_miss\`, \`candidate_triggers[]\`
        - **\`usage_stats\`** — New registry field: \`total_invocations\`, \`trigger_phrase_counts\`, \`success_rate\`, \`prm_distribution\`
        - **Incremental Build Cache** — \`source_hash\` per file; \`.build-cache.json\` skips unchanged platforms; release builds always bypass cache

        ### Agent Install — per platform

        | Platform | Command (paste into your agent) |
        |----------|---------------------------------|
        | **Claude** | \`read ${BASE}/skill-writer-claude.md and install to claude\` |
        | **OpenCode** | \`read ${BASE}/skill-writer-opencode.md and install to opencode\` |
        | **OpenClaw** | \`read ${BASE}/skill-writer-openclaw.md and install to openclaw\` |
        | **Cursor** | \`read ${BASE}/skill-writer-cursor.md and install to cursor\` |
        | **Gemini** | \`read ${BASE}/skill-writer-gemini.md and install to gemini\` |
        | **OpenAI** | \`read ${BASE}/skill-writer-openai.json and install to openai\` |
        | **MCP** | \`read ${BASE}/skill-writer-mcp.json and install to mcp\` |
        | **All platforms** | \`read ${BASE}/skill-writer.md and install\` |

        ### Agent Install — latest release (always up to date)

        \`\`\`
        read https://github.com/${{ github.repository }}/releases/latest/download/skill-writer.md and install
        \`\`\`

        ### Shell script

        \`\`\`bash
        # Install from this release (all platforms)
        curl -fsSL ${BASE}/skill-writer.md -o /tmp/skill-writer.md
        ./install.sh --url ${BASE}/skill-writer.md

        # Single platform
        ./install.sh --url ${BASE}/skill-writer-claude.md --platform claude
        \`\`\`

        ### Release assets

        | File | Platform |
        |------|----------|
        | \`skill-writer.md\` | Universal (skill-framework.md) |
        | \`skill-writer-claude.md\` | Claude |
        | \`skill-writer-opencode.md\` | OpenCode |
        | \`skill-writer-openclaw.md\` | OpenClaw |
        | \`skill-writer-cursor.md\` | Cursor |
        | \`skill-writer-gemini.md\` | Gemini |
        | \`skill-writer-openai.json\` | OpenAI (JSON) |
        | \`skill-writer-mcp.json\` | MCP (JSON manifest) |
        EOF

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        body_path: release-body.md
        generate_release_notes: true
        prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
