name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install dependencies
        run: python -m pip install ruff
      - name: Run ruff
        run: ruff check skill/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install dependencies
        run: python -m pip install mypy types-requests
      - name: Run mypy
        run: mypy skill/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install -e .
          python -m pip install pytest pytest-asyncio
      - name: Run tests
        run: python -m pytest tests/unit/ -v --tb=short

  skill-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install package
        run: python -m pip install -e .
      - name: Parse SKILL.md
        run: python -m skill.cli.main parse ./SKILL.md
      - name: Validate SKILL.md
        run: python -m skill.cli.main validate ./SKILL.md

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install dependencies
        run: python -m pip install build
      - name: Build package
        run: python -m build
      - name: Check package
        run: |
          python -m pip install dist/*.tar.gz
          python -c "import skill; print(skill.__version__ if hasattr(skill, '__version__') else 'installed')"
