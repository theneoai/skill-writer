name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Make scripts executable
        run: |
          chmod +x ./scripts/*.sh
          chmod +x ./tests/*.sh
          chmod +x ./tests/unit/*.sh
          chmod +x ./eval/**/*.sh
      
      - name: Run unit tests
        run: |
          bash tests/unit/run_tests.sh
          
      - name: Run integration tests
        run: |
          bash tests/run_tests.sh
          
      - name: Lean evaluation
        run: |
          bash scripts/lean-orchestrator.sh SKILL.md
          
      - name: Parse validation
        run: |
          bash eval/parse/parse_validate.sh SKILL.md
