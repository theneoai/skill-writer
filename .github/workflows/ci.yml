name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          # Exclude third-party and generated files; fail on real issues
          find . -name "*.sh" -type f \
            ! -path "./.git/*" \
            | xargs shellcheck --severity=error

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make executable
        run: |
          chmod +x cli/* tools/**/*.sh tests/**/*.sh 2>/dev/null || true
      - name: Run unit tests
        run: bash tests/unit/run_tests.sh

  business-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make executable
        run: |
          chmod +x cli/* tools/**/*.sh tests/**/*.sh 2>/dev/null || true
      - name: Run business tests
        run: bash tests/business/run_tests.sh

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make executable
        run: |
          chmod +x cli/* tools/**/*.sh tests/**/*.sh 2>/dev/null || true
      - name: Run integration tests
        run: bash tests/integration/run_tests.sh

  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make executable
        run: |
          chmod +x cli/* tools/**/*.sh tests/**/*.sh 2>/dev/null || true
      - name: Run E2E tests (LLM mock playback - no real API calls)
        env:
          LLM_MOCK_MODE: playback
        run: bash tests/e2e/run_tests.sh

  eval-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make executable
        run: |
          chmod +x cli/* tools/**/*.sh tests/**/*.sh 2>/dev/null || true
      - name: Run full eval
        run: bash tools/eval/main.sh --skill SKILL.md --fast --no-agent

  cli-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make executable
        run: |
          chmod +x cli/* tools/**/*.sh tests/**/*.sh 2>/dev/null || true
      - name: Test CLI
        run: |
          ./cli/skill help
          ./cli/skill eval SKILL.md --fast 2>/dev/null || true
